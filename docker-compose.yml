services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentenv_skills
      POSTGRES_USER: agentenv
      POSTGRES_PASSWORD: agentenv
    ports:
      - "7778:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentenv -d agentenv_skills"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentenv
      MINIO_ROOT_PASSWORD: agentenv-secret
    ports:
      - "7779:9000"
      - "7780:9001"

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HUB_LISTEN_ADDR: 0.0.0.0:7777
      HUB_DATABASE_URL: postgres://agentenv:agentenv@postgres:5432/agentenv_skills
      HUB_PUBLIC_BASE_URL: http://127.0.0.1:7777
      HUB_ALLOW_UNSIGNED: "false"
      HUB_SEARCH_KIND: pgvector
      HUB_STORAGE_S3_ENDPOINT: http://minio:9000
    ports:
      - "7777:7777"

  qdrant:
    profiles: ["qdrant"]
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
